name: Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-html:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Run HTML validation
        run: |
          echo "──────────────────────────────────────────"
          echo "  PreeclampsiaRisk · HTML Validation"
          echo "  WVSUMC Late-Onset PE Calculator"
          echo "──────────────────────────────────────────"
          html-validate \
            --config '{"extends":["html-validate:recommended"],"rules":{"void-style":"omit","no-inline-style":"off","long-title":"off","require-sri":"off","unrecognized-char-ref":"off"}}' \
            index.html && echo "✅ HTML validation passed" || echo "⚠️  Validation warnings detected"

  check-structure:
    name: Repository Structure Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          echo "──────────────────────────────────────────"
          echo "  Checking required repository files..."
          echo "──────────────────────────────────────────"

          REQUIRED=(
            "index.html"
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            "SECURITY.md"
            "docs/scoring-methodology.md"
            "docs/clinical-parameters.md"
          )

          ALL_OK=true
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  MISSING: $f"
              ALL_OK=false
            fi
          done

          echo "──────────────────────────────────────────"
          if [ "$ALL_OK" = true ]; then
            echo "  ✅  All required files present."
          else
            echo "  ❌  One or more required files missing."
            exit 1
          fi

      - name: Check index.html file size
        run: |
          SIZE=$(wc -c < index.html)
          echo "  📦  index.html size: ${SIZE} bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "  ❌  index.html appears too small — possible truncation."
            exit 1
          else
            echo "  ✅  File size check passed."
          fi

      - name: Verify copyright headers present
        run: |
          echo "  🔍  Checking copyright notice in index.html..."
          if grep -q "© 2026 GDD" index.html; then
            echo "  ✅  Copyright notice found."
          else
            echo "  ⚠️   Copyright notice not detected in index.html."
          fi
